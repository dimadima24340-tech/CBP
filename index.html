        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
            transition: background 0.3s ease;
        }

        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .auth-screen.hidden {
            display: none;
        }
        .auth-card {
            background: #111;
            border: 2px solid #ff5e00;
            border-radius: 40px;
            padding: 40px 30px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 94, 0, 0.3);
        }
        .auth-card h1 {
            color: #ff5e00;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .auth-card p {
            color: #ffaa55;
            font-size: 12px;
            margin-bottom: 30px;
        }
        .auth-card input {
            width: 100%;
            padding: 14px 18px;
            background: #1a1a1a;
            border: 1px solid #ff5e00;
            border-radius: 30px;
            color: #ffb347;
            font-size: 16px;
            text-align: center;
            margin-bottom: 20px;
            font-family: monospace;
        }
        .auth-card input::placeholder {
            color: #aa6f3c;
        }
        .auth-card button {
            width: 100%;
            padding: 14px;
            background: #ff5e00;
            border: none;
            border-radius: 30px;
            color: #000;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }
        .auth-card button:active {
            transform: scale(0.97);
        }
        .error-msg {
            color: #ff6a4b;
            font-size: 12px;
            margin-top: 15px;
        }

        .chat {
            width: 100%;
            max-width: 100%;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all 0.3s ease;
        }

        .tabs {
            display: flex;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        .tab-btn {
            flex: 1;
            border: none;
            font-family: monospace;
            font-size: 0.9rem;
            font-weight: bold;
            padding: 10px 0;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .tab-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .tab-pane {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }
        .tab-pane.active-pane {
            display: flex;
        }

        .header {
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        .header h3 {
            font-size: 16px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-name {
            font-size: 12px;
            padding: 5px 12px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .search-area {
            padding: 10px;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        .search-row {
            display: flex;
            gap: 8px;
        }
        .search-row input {
            flex: 1;
            padding: 10px 12px;
            border-radius: 25px;
            font-size: 13px;
            outline: none;
            transition: all 0.3s ease;
        }
        .search-row button {
            border: none;
            border-radius: 25px;
            padding: 0 20px;
            font-weight: bold;
            cursor: pointer;
        }
        .search-row button:active {
            transform: scale(0.97);
        }

        .search-result {
            margin-top: 8px;
            padding: 8px;
            border-radius: 20px;
            display: none;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
        .search-result.show {
            display: flex;
        }
        .search-result span {
            font-size: 13px;
        }
        .start-chat-btn {
            background: #ff5e00;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            color: #000;
        }
        .start-chat-btn:active {
            transform: scale(0.97);
        }

        .chats-list {
            border-bottom: 1px solid;
            max-height: 150px;
            overflow-y: auto;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        .chat-tab {
            padding: 10px 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .chat-tab-name {
            font-size: 14px;
        }
        .chat-tab-unread {
            background: #ff5e00;
            color: #000;
            border-radius: 10px;
            padding: 2px 8px;
            font-size: 10px;
            font-weight: bold;
        }

        .messages-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .no-chat-selected {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: none;
            transition: background 0.3s ease;
        }
        .messages.active {
            display: block;
        }
        .message {
            padding: 8px 12px;
            border-radius: 18px;
            margin-bottom: 8px;
            max-width: 80%;
            word-wrap: break-word;
            transition: all 0.3s ease;
        }
        .my-message {
            margin-left: auto;
        }
        .message-sender {
            font-size: 10px;
            margin-bottom: 3px;
        }
        .message-text {
            font-size: 13px;
        }
        .message-time {
            font-size: 8px;
            text-align: right;
            margin-top: 3px;
        }

        .input-area {
            padding: 8px 10px;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        .input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .input-area button {
            border: none;
            border-radius: 25px;
            padding: 10px 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .input-area button:active {
            transform: scale(0.97);
        }

        .status {
            padding: 4px 10px;
            text-align: center;
            font-size: 10px;
            font-family: monospace;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        /* ========= НАСТРОЙКИ ========= */
        .settings-pane {
            padding: 20px 16px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .settings-card {
            border-radius: 28px;
            padding: 20px 16px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .settings-card h3 {
            margin-bottom: 15px;
            font-size: 18px;
        }
        .settings-btn {
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .settings-btn:active {
            transform: scale(0.97);
        }
        .theme-icon {
            font-size: 20px;
        }
        
        @media (max-width: 500px) {
            .message {
                max-width: 85%;
            }
            .chats-list {
                max-height: 120px;
            }
        }
    </style>

</head>
<body class="theme-dark">

<div class="auth-screen" id="authScreen">
    <div class="auth-card">

    </div>
</div>

<div class="chat" id="mainChat" style="display: none;">

        <div class="tab-pane active-pane" id="chatPane">

                <div class="search-row">

            <div class="chats-list" id="chatsList">

            </div>
            
            <div class="input-area" id="inputArea" style="display: none;">
                <div class="input-row">
                    <input type="text" id="messageInput" placeholder="Сообщение...">

        </div>

                <div class="settings-card">
                    <h3>👤 АККАУНТ</h3>
                    <button class="settings-btn" id="logoutSettingsBtn">

                <div class="settings-card">
                    <h3>🎨 ОФОРМЛЕНИЕ</h3>

                        <span id="themeText">ТЁМНАЯ ТЕМА</span>

            </div>
        </div>
    </div>
</div>

<script>
    // ========== FIREBASE КОНФИГ (ЗАМЕНИТЕ НА СВОИ ДАННЫЕ) ==========
    const firebaseConfig = {
    apiKey: "AIzaSyBRtSfBYUd5PHRjwnmhb5Mrj67F7KOKr1M",
    authDomain: "noco-83ff7.firebaseapp.com",
    databaseURL: "https://noco-83ff7-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "noco-83ff7",
    storageBucket: "noco-83ff7.firebasestorage.app",
    messagingSenderId: "383521536951",
    appId: "1:383521536951:web:9c1a4b90a021db80d00632",
    measurementId: "G-EYEVMCSGMP"
    };
    
    if (firebaseConfig.apiKey === "ВАШ_API_KEY") {
        document.getElementById('authError').innerHTML = '⚠️ ОШИБКА: Настройте Firebase!';
        throw new Error('Firebase не настроен');
    }
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
    let currentUser = null;
    let currentChatWith = null;
    let currentMessagesRef = null;
    let currentMessagesListener = null;
    let currentChatsListener = null;
    let messageElementsMap = new Map();
    let isInitialLoad = true;
    
    // ТЕМА
    let currentTheme = localStorage.getItem('svpTheme') || 'dark';
    
    // Элементы DOM
    const authScreen = document.getElementById('authScreen');
    const mainChat = document.getElementById('mainChat');
    const authNickname = document.getElementById('authNickname');
    const authBtn = document.getElementById('authBtn');
    const authError = document.getElementById('authError');
    const currentUserNameSpan = document.getElementById('currentUserName');
    const statusSpan = document.getElementById('status');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const searchResult = document.getElementById('searchResult');
    const searchUserName = document.getElementById('searchUserName');
    const startChatBtn = document.getElementById('startChatBtn');
    const chatsContainer = document.getElementById('chatsContainer');
    const noChatSelected = document.getElementById('noChatSelected');
    const messagesContainer = document.getElementById('messagesContainer');
    const inputArea = document.getElementById('inputArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const tabChatBtn = document.getElementById('tabChatBtn');
    const tabSettingsBtn = document.getElementById('tabSettingsBtn');
    const chatPane = document.getElementById('chatPane');
    const settingsPane = document.getElementById('settingsPane');
    const logoutSettingsBtn = document.getElementById('logoutSettingsBtn');
    const themeSettingsBtn = document.getElementById('themeSettingsBtn');
    const themeIconSpan = document.getElementById('themeIcon');
    const themeTextSpan = document.getElementById('themeText');
    
    // ========== ФУНКЦИИ ТЕМЫ ==========
    function applyTheme(theme) {
        document.body.classList.remove('theme-dark', 'theme-light');
        document.body.classList.add(`theme-${theme}`);
        localStorage.setItem('svpTheme', theme);
        currentTheme = theme;
        
        if (theme === 'dark') {
            themeIconSpan.innerHTML = '🌙';
            themeTextSpan.innerHTML = 'ТЁМНАЯ ТЕМА';
        } else {
            themeIconSpan.innerHTML = '☀️';
            themeTextSpan.innerHTML = 'СВЕТЛАЯ ТЕМА';
        }
    }
    
    function toggleTheme() {
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        applyTheme(newTheme);
    }
    
    // Применяем сохранённую тему
    applyTheme(currentTheme);
    
    if (themeSettingsBtn) {
        themeSettingsBtn.onclick = toggleTheme;
    }
    
    // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
    function getTime() {
        const now = new Date();
        return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function getChatId(user1, user2) {
        return [user1, user2].sort().join('_');
    }
    
    // ========== ОТПИСКА ОТ СООБЩЕНИЙ ==========
    function detachMessagesListener() {
        if (currentMessagesListener && currentMessagesRef) {
            currentMessagesRef.off('child_added', currentMessagesListener);
            currentMessagesListener = null;
            currentMessagesRef = null;
        }
        messageElementsMap.clear();
    }
    
    // ========== ОТПИСКА ОТ СПИСКА ЧАТОВ ==========
    function detachChatsListener() {
        if (currentChatsListener && currentUser) {
            const userChatsRef = database.ref('userChats/' + currentUser.nickname);
            userChatsRef.off('value', currentChatsListener);
            currentChatsListener = null;
        }
    }
    
    // ========== ОЧИСТКА СООБЩЕНИЙ ==========
    function clearMessages() {
        messagesContainer.innerHTML = '';
        messageElementsMap.clear();
    }
    
    // ========== ПРОКРУТКА ВНИЗ ==========
    function scrollToBottom() {
        setTimeout(() => {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }, 100);
    }
    
    // ========== ДОБАВЛЕНИЕ СООБЩЕНИЯ ==========
    function addMessageToDOM(msg, msgKey) {
        if (messageElementsMap.has(msgKey)) return;
        
        const isMy = (msg.sender === currentUser.nickname);
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message' + (isMy ? ' my-message' : '');
        messageDiv.setAttribute('data-key', msgKey);
        messageDiv.innerHTML = `
            ${!isMy ? `<div class="message-sender">${escapeHtml(msg.sender)}</div>` : ''}
            <div class="message-text">${escapeHtml(msg.text)}</div>
            <div class="message-time">${msg.time}</div>
        `;
        
        // Вставляем в правильное место на основе ключа Firebase
        let inserted = false;
        const existingMessages = messagesContainer.querySelectorAll('.message');
        
        for (let i = 0; i < existingMessages.length; i++) {
            const existingKey = existingMessages[i].getAttribute('data-key');
            if (existingKey && msgKey < existingKey) {
                messagesContainer.insertBefore(messageDiv, existingMessages[i]);
                inserted = true;
                break;
            }
        }
        
        if (!inserted) {
            messagesContainer.appendChild(messageDiv);
        }
        
        messageElementsMap.set(msgKey, messageDiv);
        return messageDiv;
    }
    
    // ========== АВТОРИЗАЦИЯ ==========
    function login() {
        let nickname = authNickname.value.trim();
        if (nickname === "") {
            authError.textContent = "Введите никнейм!";
            return;
        }
        if (nickname.length > 20) nickname = nickname.slice(0, 18);
        
        database.ref('users/' + nickname).once('value', (snapshot) => {
            if (snapshot.exists()) {
                currentUser = {
                    nickname: nickname,
                    uid: snapshot.val().uid || nickname
                };
            } else {
                currentUser = {
                    nickname: nickname,
                    uid: nickname + '_' + Date.now()
                };
                database.ref('users/' + nickname).set({
                    nickname: nickname,
                    uid: currentUser.uid,
                    lastSeen: Date.now(),
                    online: true
                });
            }
            
            localStorage.setItem('svpUser', JSON.stringify(currentUser));
            
            authScreen.classList.add('hidden');
            mainChat.style.display = 'flex';
            currentUserNameSpan.textContent = currentUser.nickname;
            statusSpan.innerHTML = '🟢 ONLINE • ' + currentUser.nickname;
            
            loadUserChats();
            
            database.ref('users/' + currentUser.nickname).onDisconnect().update({
                online: false,
                lastSeen: firebase.database.ServerValue.TIMESTAMP
            });
        });
    }
    
    function logout() {
        if (currentUser) {
            database.ref('users/' + currentUser.nickname + '/online').set(false);
            database.ref('users/' + currentUser.nickname + '/lastSeen').set(firebase.database.ServerValue.TIMESTAMP);
        }
        
        detachMessagesListener();
        detachChatsListener();
        
        localStorage.removeItem('svpUser');
        currentUser = null;
        currentChatWith = null;
        
        authScreen.classList.remove('hidden');
        mainChat.style.display = 'none';
        authNickname.value = '';
        authError.textContent = '';
        chatsContainer.innerHTML = '';
        clearMessages();
        messagesContainer.classList.remove('active');
        noChatSelected.style.display = 'flex';
        inputArea.style.display = 'none';
        currentChatWith = null;
        
        // Возвращаемся на вкладку чатов
        if (chatPane) chatPane.classList.add('active-pane');
        if (settingsPane) settingsPane.classList.remove('active-pane');
        if (tabChatBtn) tabChatBtn.classList.add('active');
        if (tabSettingsBtn) tabSettingsBtn.classList.remove('active');
    }
    
    // Кнопка выхода из настроек
    if (logoutSettingsBtn) {
        logoutSettingsBtn.onclick = logout;
    }
    
    const savedUser = localStorage.getItem('svpUser');
    if (savedUser) {
        try {
            currentUser = JSON.parse(savedUser);
            authScreen.classList.add('hidden');
            mainChat.style.display = 'flex';
            currentUserNameSpan.textContent = currentUser.nickname;
            statusSpan.innerHTML = '🟢 ONLINE • ' + currentUser.nickname;
            database.ref('users/' + currentUser.nickname + '/online').set(true);
            loadUserChats();
        } catch(e) {
            logout();
        }
    }
    
    authBtn.onclick = login;
    authNickname.onkeypress = (e) => { if (e.key === 'Enter') login(); };
    
    // ========== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ==========
    function switchTab(tabId) {
        if (tabId === 'chat') {
            chatPane.classList.add('active-pane');
            settingsPane.classList.remove('active-pane');
            tabChatBtn.classList.add('active');
            tabSettingsBtn.classList.remove('active');
            if (messageInput) messageInput.focus();
        } else {
            settingsPane.classList.add('active-pane');
            chatPane.classList.remove('active-pane');
            tabSettingsBtn.classList.add('active');
            tabChatBtn.classList.remove('active');
        }
    }
    
    if (tabChatBtn) tabChatBtn.onclick = () => switchTab('chat');
    if (tabSettingsBtn) tabSettingsBtn.onclick = () => switchTab('settings');
    
    // ========== ПОИСК ПОЛЬЗОВАТЕЛЕЙ ==========
    searchBtn.onclick = () => {
        const query = searchInput.value.trim().toLowerCase();
        if (!query) return;
        
        database.ref('users').once('value', (snapshot) => {
            let found = null;
            snapshot.forEach((child) => {
                const userData = child.val();
                if (userData.nickname && userData.nickname.toLowerCase() === query) {
                    found = userData;
                }
            });
            
            if (found && found.nickname !== currentUser.nickname) {
                searchUserName.textContent = found.nickname;
                searchResult.classList.add('show');
                startChatBtn.onclick = () => {
                    openChatWith(found.nickname);
                    searchResult.classList.remove('show');
                    searchInput.value = '';
                    // Переключаемся на вкладку чатов
                    switchTab('chat');
                };
            } else if (found && found.nickname === currentUser.nickname) {
                searchUserName.textContent = '❌ Это вы сами';
                searchResult.classList.add('show');
                setTimeout(() => searchResult.classList.remove('show'), 2000);
            } else {
                searchUserName.textContent = '❌ Пользователь не найден';
                searchResult.classList.add('show');
                setTimeout(() => searchResult.classList.remove('show'), 2000);
            }
        });
    };
    
    // ========== ОТКРЫТИЕ ЧАТА ==========
    function openChatWith(otherUser) {
        if (otherUser === currentUser.nickname) {
            statusSpan.innerHTML = '⚠️ Нельзя писать самому себе';
            setTimeout(() => statusSpan.innerHTML = '🟢 ONLINE • ' + currentUser.nickname, 2000);
            return;
        }
        
        detachMessagesListener();
        
        currentChatWith = otherUser;
        
        noChatSelected.style.display = 'none';
        messagesContainer.classList.add('active');
        inputArea.style.display = 'block';
        messageInput.focus();
        
        clearMessages();
        
        document.querySelectorAll('.chat-tab').forEach(tab => {
            const user = tab.getAttribute('data-user');
            if (user === otherUser) {
                tab.classList.add('active');
                const unreadSpan = tab.querySelector('.chat-tab-unread');
                if (unreadSpan) unreadSpan.remove();
            } else {
                tab.classList.remove('active');
            }
        });
        
        database.ref('userChats/' + currentUser.nickname + '/' + otherUser + '/unread').set(0);
        
        loadMessages(otherUser);
    }
    
    // ========== ЗАГРУЗКА СООБЩЕНИЙ ==========
    function loadMessages(withUser) {
        const chatId = getChatId(currentUser.nickname, withUser);
        currentMessagesRef = database.ref('messages/' + chatId);
        
        isInitialLoad = true;
        
        currentMessagesRef.limitToLast(50).once('value', (snapshot) => {
            const messages = [];
            snapshot.forEach((childSnapshot) => {
                messages.push({
                    key: childSnapshot.key,
                    ...childSnapshot.val()
                });
            });
            messages.sort((a, b) => {
                if (a.key < b.key) return -1;
                if (a.key > b.key) return 1;
                return 0;
            });
            
            messages.forEach(msg => {
                addMessageToDOM(msg, msg.key);
            });
            
            isInitialLoad = false;
            scrollToBottom();
        });
        
        currentMessagesListener = currentMessagesRef.on('child_added', (snapshot) => {
            const msg = snapshot.val();
            const msgKey = snapshot.key;
            
            if (messageElementsMap.has(msgKey)) return;
            
            addMessageToDOM(msg, msgKey);
            
            if (msg.sender !== currentUser.nickname && currentChatWith === withUser && !isInitialLoad) {
                database.ref('userChats/' + currentUser.nickname + '/' + withUser + '/unread').set(0);
                playNotificationSound();
            }
            
            if (!isInitialLoad) {
                scrollToBottom();
            }
        });
    }
    
    function playNotificationSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = 880;
            gainNode.gain.value = 0.1;
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
            oscillator.stop(audioCtx.currentTime + 0.3);
            if (audioCtx.state === 'suspended') audioCtx.resume();
        } catch(e) {}
    }
    
    // ========== ЗАГРУЗКА СПИСКА ЧАТОВ ==========
    function loadUserChats() {
        detachChatsListener();
        
        const userChatsRef = database.ref('userChats/' + currentUser.nickname);
        
        currentChatsListener = userChatsRef.on('value', (snapshot) => {
            const chats = [];
            snapshot.forEach((child) => {
                const data = child.val();
                chats.push({
                    withUser: child.key,
                    lastMessage: data.lastMessage || '',
                    lastTime: data.lastTime || 0,
                    unread: data.unread || 0
                });
            });
            
            chats.sort((a, b) => (b.lastTime || 0) - (a.lastTime || 0));
            
            if (chats.length === 0) {
                chatsContainer.innerHTML = '<div style="padding: 10px; text-align: center; opacity: 0.7; font-size: 11px;">😔 Нет диалогов<br>Найдите пользователя в поиске</div>';
                return;
            }
            
            chatsContainer.innerHTML = chats.map(chat => `
                <div class="chat-tab ${currentChatWith === chat.withUser ? 'active' : ''}" data-user="${chat.withUser}">
                    <span class="chat-tab-name">💬 ${escapeHtml(chat.withUser)}</span>
                    ${chat.unread > 0 ? `<span class="chat-tab-unread">${chat.unread}</span>` : ''}
                </div>
            `).join('');
            
            document.querySelectorAll('.chat-tab').forEach(tab => {
                tab.onclick = () => {
                    const user = tab.getAttribute('data-user');
                    openChatWith(user);
                };
            });
        });
    }
    
    // ========== ОТПРАВКА СООБЩЕНИЯ ==========
    function sendMessage() {
        if (!currentChatWith) {
            statusSpan.innerHTML = '⚠️ Выберите чат';
            setTimeout(() => statusSpan.innerHTML = '🟢 ONLINE • ' + currentUser.nickname, 1500);
            return;
        }
        
        const text = messageInput.value.trim();
        if (text === '') return;
        
        const chatId = getChatId(currentUser.nickname, currentChatWith);
        
        const message = {
            sender: currentUser.nickname,
            receiver: currentChatWith,
            text: text,
            time: getTime(),
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };
        
        messageInput.value = '';
        messageInput.focus();
        
        database.ref('messages/' + chatId).push(message).then((newMsgRef) => {
            const updateData = {
                lastMessage: text.length > 30 ? text.slice(0, 27) + '...' : text,
                lastTime: firebase.database.ServerValue.TIMESTAMP
            };
            
            database.ref('userChats/' + currentUser.nickname + '/' + currentChatWith).update({
                ...updateData,
                unread: 0
            });
            
            database.ref('userChats/' + currentChatWith + '/' + currentUser.nickname).update({
                ...updateData,
                unread: firebase.database.ServerValue.increment(1)
            });
        }).catch(err => {
            statusSpan.innerHTML = '❌ Ошибка: ' + err.message;
            setTimeout(() => statusSpan.innerHTML = '🟢 ONLINE • ' + currentUser.nickname, 2000);
            messageInput.value = text;
        });
    }
    
    sendBtn.onclick = sendMessage;
    messageInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    
    // ========== СТАТУС ОНЛАЙН ==========
    database.ref('.info/connected').on('value', (snap) => {
        if (snap.val() === true && currentUser) {
            statusSpan.innerHTML = '🟢 ONLINE • ' + currentUser.nickname;
            if (currentUser) {
                database.ref('users/' + currentUser.nickname + '/online').set(true);
            }
        } else if (currentUser) {
            statusSpan.innerHTML = '🔴 OFFLINE • ' + currentUser.nickname;
        }
    });
    
    console.log('✅ Чат готов!');
</script>
</body>
